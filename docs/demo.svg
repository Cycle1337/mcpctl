<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <rect width="720" height="380" rx="10" fill="#1e1e2e"/>
  <circle cx="20" cy="22" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="22" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="22" r="6" fill="#a6e3a1"/>
  <rect x="0" y="40" width="720" height="1" fill="#313244"/>

  <text x="16" y="68" font-size="13" fill="#7f849c">$ <tspan fill="#cdd6f4" font-weight="bold">mcpctl list</tspan></text>

  <text x="16" y="96" font-size="13">
    <tspan fill="#7f849c"># </tspan><tspan fill="#cdd6f4" font-weight="bold">Claude Code</tspan><tspan fill="#7f849c"> — /home/you/.claude.json</tspan>
  </text>
  <text x="16" y="114" font-size="13" fill="#7f849c">  (no servers)</text>

  <text x="16" y="142" font-size="13">
    <tspan fill="#7f849c"># </tspan><tspan fill="#cdd6f4" font-weight="bold">Cursor</tspan><tspan fill="#7f849c"> — /home/you/.cursor/mcp.json</tspan>
  </text>
  <text x="16" y="160" font-size="13">
    <tspan fill="#a6e3a1">filesystem         </tspan><tspan fill="#89dceb">[stdio]</tspan><tspan fill="#7f849c"> npx -y @modelcontextprotocol/server-filesystem /tmp</tspan>
  </text>
  <text x="16" y="178" font-size="13">
    <tspan fill="#a6e3a1">github             </tspan><tspan fill="#89dceb">[stdio]</tspan><tspan fill="#7f849c"> npx -y @modelcontextprotocol/server-github</tspan>
  </text>

  <text x="16" y="206" font-size="13">
    <tspan fill="#7f849c"># </tspan><tspan fill="#cdd6f4" font-weight="bold">Claude Desktop</tspan><tspan fill="#7f849c"> — /home/you/.config/Claude/claude_desktop_config.json</tspan>
  </text>
  <text x="16" y="224" font-size="13" fill="#7f849c">  (no servers)</text>

  <text x="16" y="252" font-size="13">
    <tspan fill="#7f849c"># </tspan><tspan fill="#cdd6f4" font-weight="bold">Codex</tspan><tspan fill="#7f849c"> — /home/you/.codex/config.toml</tspan>
  </text>
  <text x="16" y="270" font-size="13">
    <tspan fill="#a6e3a1">memory             </tspan><tspan fill="#89dceb">[http]</tspan><tspan fill="#7f849c"> https://mcp.example.com/sse</tspan>
  </text>

  <text x="16" y="330" font-size="11" fill="#585b70">mcpctl — one CLI for MCP servers across Claude Code, Cursor, Claude Desktop and Codex</text>
</svg>
